---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-store-carts
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Tbraima44/PROJECT-BEDROCK-ARGOCD.git
    targetRevision: main
    path: retail-store-app-charts/cart/chart
    helm:
      valueFiles:
        - ../../../kubernetes/helm/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: retail-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
